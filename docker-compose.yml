services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-volunteer_app}
      POSTGRES_USER: ${POSTGRES_USER:-volunteer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-volunteer}
    volumes:
      - postgres_data_volunteer:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volunteer} -d ${POSTGRES_DB:-volunteer_app}"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrator:
    build:
      context: ./backend
      dockerfile: .docker/migrator.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth-service/.docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5001
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    depends_on:
      admin-bootstrap:
        condition: service_completed_successfully
    restart: unless-stopped

  admin-bootstrap:
    build:
      context: ./backend
      dockerfile: services/auth-service/.docker/Dockerfile
    command: ["node", "scripts/ensureAdmin.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_FIRST_NAME: ${ADMIN_FIRST_NAME:-Admin}
      ADMIN_LAST_NAME: ${ADMIN_LAST_NAME:-User}
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: "no"

  projects-service:
    build:
      context: ./backend
      dockerfile: services/projects-service/.docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5002
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      APPLICATIONS_SERVICE_URL: ${APPLICATIONS_SERVICE_URL:-http://applications-service:5003}
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  applications-service:
    build:
      context: ./backend
      dockerfile: services/applications-service/.docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5003
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:5001}
      GATEWAY_URL: ${GATEWAY_URL:-http://gateway:5000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,https://localhost}
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  admin-service:
    build:
      context: ./backend
      dockerfile: services/admin-service/.docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5004
      DATABASE_URL: ${DATABASE_URL:-postgresql://volunteer:volunteer@postgres:5432/volunteer_app?schema=public}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    depends_on:
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  gateway:
    build:
      context: ./backend
      dockerfile: .docker/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,https://localhost}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:5001}
      PROJECTS_SERVICE_URL: ${PROJECTS_SERVICE_URL:-http://projects-service:5002}
      APPLICATIONS_SERVICE_URL: ${APPLICATIONS_SERVICE_URL:-http://applications-service:5003}
      ADMIN_SERVICE_URL: ${ADMIN_SERVICE_URL:-http://admin-service:5004}
    depends_on:
      auth-service:
        condition: service_started
      projects-service:
        condition: service_started
      applications-service:
        condition: service_started
      admin-service:
        condition: service_started
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/.docker/Dockerfile
    profiles: ["dev"]
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  nginx-prod:
    build:
      context: .
      dockerfile: nginx/.docker/Dockerfile
    profiles: ["prod"]
    depends_on:
      gateway:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.app.loadbalancer.server.port=80"
      - "traefik.http.routers.app-http.rule=Host(`${TRAEFIK_HOSTNAME:-example.com}`)"
      - "traefik.http.routers.app-http.entrypoints=web"
      - "traefik.http.routers.app-http.middlewares=app-https-redirect"
      - "traefik.http.middlewares.app-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.app.rule=Host(`${TRAEFIK_HOSTNAME:-example.com}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app.middlewares=secure-headers@file"
    restart: unless-stopped

  traefik:
    image: traefik:v3.6.1
    profiles: ["prod"]
    depends_on:
      nginx-prod:
        condition: service_started
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/config/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_letsencrypt:/letsencrypt
    restart: unless-stopped

volumes:
  postgres_data_volunteer:
  traefik_letsencrypt:
